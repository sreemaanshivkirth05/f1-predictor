name: F1 Smart Daily Update

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8:00 AM UTC
    - cron: '0 23 * * 0'  # Also Sunday night (after races)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30     # Smart update takes 3-12 mins max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy requests xgboost scikit-learn tqdm

      - name: Run smart daily update
        run: python src/data_collection/daily_update.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ models/
          git diff --staged --quiet || git commit -m "🤖 Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push